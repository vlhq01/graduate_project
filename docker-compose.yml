services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tech_advisor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build: ./ai-service
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/tech_advisor
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  techadvisor:
    build: ./techadvisor
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tech_advisor
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # Báo cho Spring biết file Firebase nằm ở đâu
      GOOGLE_APPLICATION_CREDENTIALS: /app/firebase-service-account.json 
    ports:
      - "8080:8080"
    volumes:
      # Mount file từ ngoài máy thật vào trong container
      - ./firebase-service-account.json:/app/firebase-service-account.json
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy

volumes:
  pgdata: